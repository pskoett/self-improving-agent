name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Unit tests (OpenClaw hook)
        run: node --test hooks/openclaw/handler.test.js

      - name: Type-check handler.ts
        run: |
          npm install --no-save --no-package-lock --no-audit --no-fund typescript@5 @types/node
          npx --no-install tsc --noEmit --strict --skipLibCheck \
            --module nodenext --moduleResolution nodenext --target es2022 \
            hooks/openclaw/handler.ts .github/tscheck/openclaw-hooks-stub.d.ts

      - name: Shell syntax check
        run: bash -n scripts/extract-skill.sh
